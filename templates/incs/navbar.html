<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link 
      href="https://lib.arvancloud.ir/bulma/0.9.4/css/bulma-rtl.css " 
      rel="stylesheet">
  <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    }
    
    body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #000;
    color: #eee;
    }
    
    /* Navbar */
    .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #111;
    padding: 1rem 2rem;
    box-shadow: 0 4px 10px rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
    z-index: 1000;
    }
    
    .left-nav {
    display: flex;
    align-items: center;
    gap: 2rem;
    }
    
    .logo {
    font-size: 1.8rem;
    font-weight: bold;
    color: #f1f1f1;
    }
    
    .nav-links {
    list-style: none;
    display: flex;
    gap: 1.2rem;
    }
    
    .nav-links a {
    text-decoration: none;
    color: #ccc;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    transition: all 0.3s ease;
    }
    
    .nav-links a:hover {
    background-color: #222;
    color: #fff;
    }
    
    
    /* Sections */
    section {
    padding: 3rem 2rem;
    text-align: center;
    }
    
    h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    }
    
    h2 {
    font-size: 2rem;
    margin-top: 2rem;
    }
    
  </style>
</head>
<body>
    <nav class="navbar">
      <div class="left-nav">
        <a href="{% url 'home:home' %}" class="logo">Home</a>
        <ul class="nav-links left-links">
        </ul>
      </div>      
      <ul class="nav-links right-links">
        <li>

        </li>
      </ul>
    </nav>
</body>
</html>
