{% extends 'base.html' %}
{% load static %}

{% block title %} Product List {% endblock %}

{% block content %}

    <div class="container mt-4">
        <div class="row">
            {% for product in products %}
                <div class="col-md-4 col-lg-3 mb-4">
                    <div class="card h-100" style="width: 18rem;">
                        <a href=""><img src="{{ product.cover.url }}" class="card-img-top" alt="{{ product.tag }}" style="height: 200px; object-fit: cover;"></a>
                        <div class="card-body d-flex flex-column">
                            <a href=""><h5 href="#" class="card-title">{{ product.name }}</h5></a>
                            <p class="card-text flex-grow-1">{{ product.description|truncatewords:10 }}</p>
                            <div class="mt-auto">
                                <p><strong>Price: {{ product.price }} IRT</strong></p>
                                <a href="#" class="btn btn-success">Buy</a>
                                <a href="#" class="btn btn-danger"><i class="far fa-heart"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>

{% endblock %}
