{% extends 'base.html' %}

{% block title %} Confirm Password {% endblock %}

{% block content %}

    {% if validlink %}
        <form action="" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Reset</button>
        </form>
    {% else %}
        <p class="justify-content-center text-danger">This link is not valid. Please try again...</p>
    {% endif %}

{% endblock %}
